<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計測中</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="mini-timer">00:00</div>

        <div id="stopBtn" class="unified-circle">
            <div class="circle-unit">BURNED</div>
            <div class="circle-kcal-value" id="current-kcal-value">0.0</div>
            <div class="circle-unit">KCAL</div>
            <div class="circle-action-label" id="action-label">TAP TO PAUSE</div>
        </div>

        <div id="ai-cheer">AIがあなたの運動を見守っています...</div>

        <button class="btn-end-link" id="endBtn">HOLD OR TAP HERE TO FINISH</button>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
