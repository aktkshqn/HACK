<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計測中</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="circle ellipse"></div>
        <div class="rectangle-timer">00:00</div>
        <div class="rectangle-kcal">現在0kcal消費中！</div>
        <button class="stop">
            <div class="stop-A"></div>
            <div class="stop-B"></div>
        </button>
        <button class="end" id="endBtn">
            <div class="endsquare"></div>
        </button>
    </header>
    <script type="module" src="main.js"></script>
</body>
</html>
