<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitSweets</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="app-wrapper">
        <!-- 左側エリア（PC用） -->
        <aside class="left-panel">
            <h1 class="key-message">今日の頑張りを、<br>美味しさに変えよう。</h1>
        </aside>

        <!-- 右側エリア（コンテンツ） -->
        <main class="right-panel">
            <div class="gohan-card" style="border-color: var(--primary);">
                <div style="margin-bottom: 2.5rem;">
                    <h2 style="font-size: 2.2rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem;">Gohan-Fit</h2>
                    <p style="color: var(--text-muted); font-weight: 600;">運動した分だけ、美味しいご褒美を。</p>
                </div>

                <div style="background: #f8fafc; padding: 1.5rem; border-radius: 20px; margin-bottom: 2rem;">
                    <p style="font-size: 0.9rem; color: var(--text-muted); line-height: 1.6;">
                        Google Fit と連携して、<br>最高のご褒美レストランを見つけよう。
                    </p>
                </div>

                <button id="loginBtn" class="btn-gohan" style="width: 100%; border-radius: 50px; padding: 1.2rem; font-size: 1rem;">
                    GOOGLE LOGIN
                </button>
            </div>
        </main>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
