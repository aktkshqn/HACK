<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitSweets</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="container" style="justify-content: flex-start;">
        <header class="app-header">
            <span style="font-weight: 800; font-size: 1.4rem; color: var(--primary);">FitSweets</span>
            <nav class="desktop-nav">
                <a href="/pages/overview.html" class="nav-link">概要</a>
                <a href="/pages/contact.html" class="nav-link">問い合わせ</a>
                <a href="#" class="nav-link active">ログイン</a>
            </nav>
        </header>
        <main style="width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
            <div class="logo-area" style="margin-bottom: 2rem; text-align: center;">
                <h1 style="font-size: 2.5rem; color: var(--text-dark); margin-bottom: 0.5rem;">FitSweets</h1>
                <p style="color: #64748b; font-weight: 600;">運動して、スイーツをご褒美に。</p>
            </div>
            <button id="loginBtn" class="unified-circle" style="transform: scale(1.1); text-decoration: none; border-color: var(--primary);">
                <span class="circle-unit" style="font-size: 1.2rem; color: var(--primary);">GOOGLE LOGIN</span>
            </button>
        </main>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
