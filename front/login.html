<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - FitSweets</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="container">
        <div class="header" style="text-align: center;">
            <h1 style="font-size: 2.8rem; margin-bottom: 0.5rem; color: #1e293b; font-weight: 800;">FitSweets</h1>
            <p style="color: #64748b; font-size: 1.1rem; margin-bottom: 3rem;">運動のあとは、最高のご褒美を。</p>
        </div>

        <div class="status-card-timer" style="background-color: var(--card-bg); padding: 3rem 2rem; border-radius: 40px; text-align: center;">
            <p style="color: #475569; font-weight: 600; text-align: center; margin-bottom: 2rem; font-size: 1.1rem;">
                Google Fit と連携して、運動データの計測を開始しましょう。
            </p>
            <div style="display: flex; justify-content: center;">
                <a href="#" id="loginBtn" class="login-hero-btn">Googleでログイン</a>
            </div>
        </div>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
