<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitSweets</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- 左側エリア -->
        <aside class="left-panel">
            <h1 class="key-message">少し一休み。<br>ご褒美まであと少し。</h1>
        </aside>

        <!-- 右側エリア -->
        <main class="right-panel">
            <header class="app-header" style="position: absolute; top: 0; left: 0; right: 0; border: none; background: transparent; padding: 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 100;">
                <span style="font-weight: 800; font-size: 1.4rem; color: var(--accent);">Gohan-Fit</span>
                <div class="nav-links-container" id="navMenu">
                    <a href="history.html" class="nav-link">履歴</a>
                    <a href="#" id="logoutBtn" class="nav-link" style="color: var(--accent);">ログアウト</a>
                </div>
                <button class="menu-toggle" id="menuToggle">☰</button>
            </header>

            <div class="gohan-card" style="border-color: var(--accent);">
                <div style="margin-bottom: 2rem;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">☕</div>
                    <h2 style="font-size: 1.5rem; color: var(--accent); font-weight: 800; margin-bottom: 0.5rem;">PAUSED</h2>
                    <p style="color: var(--text-muted); line-height: 1.6;">
                        現在の合計：<span id="current-kcal-value" style="font-weight: 800; color: var(--text-main);">0.0</span> kcal<br>
                        しっかり呼吸を整えて、次へ進みましょう。
                    </p>
                </div>

                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <button id="resumeBtn" class="btn-gohan" style="width: 100%; border-color: var(--primary); color: var(--primary); padding: 1.2rem; border-radius: 50px;">
                        再スタート
                    </button>
                    <button id="finishBtn" class="btn-gohan" style="width: 100%; border-color: var(--accent); color: var(--accent); padding: 1rem; border-radius: 50px; font-size: 0.9rem;">
                        運動を終了する
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
