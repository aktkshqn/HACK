<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitSweets</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="pause-page">
    <div class="container" style="justify-content: flex-start;">
        <header class="app-header">
            <div style="width: 60px;"></div> <!-- Spacer -->
            <span style="font-weight: 800; font-size: 1.2rem;">PAUSED</span>
            <a href="history.html" class="nav-link">LOGS</a>
        </header>

        <div style="margin-top: 4rem; text-align: center;">
            <div class="mini-timer" id="pause-timer" style="font-size: 1.5rem; margin-bottom: 2rem; color: #94a3b8;">00:00</div>
            
            <div id="resumeBtn" class="unified-circle is-paused" style="margin: 0 auto;">
                <div class="circle-unit">RESTING...</div>
                <div class="circle-kcal-value" id="current-kcal">0.0</div>
                <div class="circle-action-label">Tap to Resume</div>
            </div>

            <div style="margin-top: 4rem;">
                <p id="ai-cheer" style="font-weight: 700; color: #64748b; margin-bottom: 2rem;">
                    ひと息ついたら、再開しましょう！🧘
                </p>
                <a href="#" id="finishBtn" class="end-btn" style="text-decoration: none; display: inline-block;">
                    FINISH SESSION
                </a>
            </div>
        </div>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
