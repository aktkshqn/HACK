<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitSweets</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- 左側エリア -->
        <aside class="left-panel">
            <h1 class="key-message">美味しいひとときのために、<br>今は一歩ずつ。</h1>
        </aside>

        <!-- 右側エリア -->
        <main class="right-panel">
            <header class="app-header" style="position: absolute; top: 0; left: 0; right: 0; border: none; background: transparent; padding: 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 100;">
                <span style="font-weight: 800; font-size: 1.4rem; color: var(--primary);">Gohan-Fit</span>
                <div class="nav-links-container" id="navMenu">
                    <a href="history.html" class="nav-link">履歴</a>
                    <a href="#" id="logoutBtn" class="nav-link" style="color: var(--accent);">ログアウト</a>
                </div>
                <button class="menu-toggle" id="menuToggle">☰</button>
            </header>

            <div class="gohan-card is-recording" id="recordingCard" style="border-color: var(--primary);">
                <div style="margin-bottom: 2rem;">
                    <div style="font-size: 0.9rem; font-weight: 800; color: var(--primary); margin-bottom: 1rem; letter-spacing: 0.1em;">RECORDING...</div>
                    <div class="mini-timer" id="timer" style="font-size: 3rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.5rem; font-family: 'Roboto Mono', monospace;">00:00</div>
                    <div style="font-size: 1.2rem; color: var(--text-muted);">
                        <span id="current-kcal-value" style="font-weight: 800; color: var(--text-main); font-size: 2rem;">0.0</span> kcal
                    </div>
                </div>

                <div id="ai-cheer" style="margin-bottom: 2rem; min-height: 20px; font-weight: 600; font-size: 0.9rem; color: var(--primary);">
                    頑張っていますね！その調子です。
                </div>

                <button id="stopBtn" class="btn-gohan" style="width: 100%; padding: 1.2rem; border-radius: 50px;">
                    一時停止
                </button>
            </div>
        </main>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
