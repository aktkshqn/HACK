<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitSweets</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container" style="justify-content: flex-start;">
        <header class="app-header">
            <a href="#" id="logoutBtn" class="nav-link">LOGOUT</a>
            <span style="font-weight: 800; font-size: 1.2rem;">RESULT</span>
            <a href="history.html" class="nav-link">LOGS</a>
        </header>

        <main style="width: 100%; padding: 1.5rem; text-align: center;">
            <div style="margin-top: 1rem; margin-bottom: 2rem;">
                <div class="status-card-timer" style="background-color: var(--primary); padding: 1.5rem; border-radius: 24px;">
                    <h2 class="rectangle-kcalB" style="color: white; font-size: 1.4rem;">取得中...</h2>
                </div>
            </div>

            <h3 style="font-size: 1rem; color: #64748b; margin-bottom: 1rem; font-weight: 800;">GIFTS FOR YOU</h3>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <button id="snack1" class="summary-card" style="border-width: 2px; width: 100%; text-align: left;"></button>
                <button id="snack2" class="summary-card" style="border-width: 2px; width: 100%; text-align: left;"></button>
                <button id="snack3" class="summary-card" style="border-width: 2px; width: 100%; text-align: left;"></button>
            </div>

            <div style="margin-top: 3rem;">
                <a href="startmenu.html" class="nav-link" style="background-color: var(--primary); color: white; padding: 1rem 3rem; display: inline-block;">RESTART</a>
            </div>
        </main>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
