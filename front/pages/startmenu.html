<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitSweets</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- 左側エリア -->
        <aside class="left-panel">
            <h1 class="key-message">今日の頑張りを、<br>美味しさに変えよう。</h1>
        </aside>

        <!-- 右側エリア -->
        <main class="right-panel">
            <header class="app-header" style="position: absolute; top: 0; left: 0; right: 0; border: none; background: transparent; padding: 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 100;">
                <span style="font-weight: 800; font-size: 1.4rem; color: var(--primary);">Gohan-Fit</span>
                
                <div class="nav-links-container" id="navMenu">
                    <a href="history.html" class="nav-link">履歴</a>
                    <a href="#" id="logoutBtn" class="nav-link" style="color: var(--accent);">ログアウト</a>
                </div>
                
                <button class="menu-toggle" id="menuToggle">☰</button>
            </header>

            <div class="gohan-card" style="border-color: var(--success);">
                <div style="margin-bottom: 2rem;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">🏃‍♂️</div>
                    <h2 style="font-size: 1.5rem; color: var(--success); font-weight: 800; margin-bottom: 0.5rem;">READY TO GO?</h2>
                    <p style="color: var(--text-muted); line-height: 1.6;">
                        「お腹すいた！」を「頑張った！」に変える時間です。<br>美味しいご褒美があなたを待っています。
                    </p>
                </div>

                <button id="startBtn" class="btn-gohan" style="width: 100%; border-color: var(--success); color: var(--success); padding: 1.5rem; font-size: 1.2rem; border-radius: 50px;">
                    運動をスタート
                </button>
            </div>
        </main>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
