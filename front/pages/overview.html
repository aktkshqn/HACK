<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitSweets - 概要</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container" style="justify-content: flex-start;">
        <header class="app-header">
            <a href="startmenu.html" class="nav-link">← BACK</a>
            <span style="font-weight: 800; font-size: 1.2rem;">OVERVIEW</span>
            <div style="width: 40px;"></div>
        </header>
        <main style="padding: 2rem; text-align: left; line-height: 1.8;">
            <h2 style="color: var(--primary); margin-bottom: 1rem;">FitSweets とは？</h2>
            <p>FitSweets は、運動のご褒美に「最高に美味しいスイーツ」を罪悪感なく楽しむためのフィットネス継続アプリです。</p>
            <p>Google Fit と連携し、リアルタイムで消費カロリーを計測。成果に応じて AI があなたの街の絶品スイーツを提案します。</p>
            <div style="margin-top: 2rem; background: #f8fafc; padding: 1.5rem; border-radius: 16px;">
                <h3 style="font-size: 1rem; margin-bottom: 0.5rem;">主な機能</h3>
                <ul style="padding-left: 1.2rem;">
                    <li>リアルタイム・カロリー計測</li>
                    <li>AI によるパーソナライズ賞賛</li>
                    <li>ご褒美スイーツ提案</li>
                    <li>過去ログ・統計管理</li>
                </ul>
            </div>
            <a href="startmenu.html" class="nav-link" style="display: block; margin-top: 2rem; text-align: center; background: var(--primary); color: white; padding: 1rem; border-radius: 12px;">START TRAINING</a>
        </main>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
