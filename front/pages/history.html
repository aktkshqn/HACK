<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitSweets</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- 左側エリア -->
        <aside class="left-panel">
            <h1 class="key-message">継続は、最高のスパイス。<br>これまでの歩みを振り返る。</h1>
        </aside>

        <!-- 右側エリア -->
        <main class="right-panel">
            <header class="app-header" style="position: absolute; top: 0; left: 0; right: 0; border: none; background: transparent; padding: 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 100;">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <a href="startmenu.html" class="nav-link" style="font-size: 1.2rem;">←</a>
                    <span style="font-weight: 800; font-size: 1.4rem; color: var(--primary);">Gohan-Fit</span>
                </div>
                <div class="nav-links-container" id="navMenu">
                    <a href="#" id="logoutBtn" class="nav-link" style="color: var(--accent);">ログアウト</a>
                </div>
                <button class="menu-toggle" id="menuToggle">☰</button>
            </header>

            <div class="gohan-card" style="border-color: var(--primary); margin-bottom: 2rem;">
                <h2 style="font-size: 1.2rem; color: var(--primary); font-weight: 800; margin-bottom: 1rem;">YOUR PROGRESS</h2>
                <div style="display: flex; justify-content: space-around; gap: 1rem;">
                    <div>
                        <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 800;">TODAY</div>
                        <div style="font-size: 2rem; font-weight: 800;"><span id="today-total">0</span> <small style="font-size: 0.8rem;">kcal</small></div>
                    </div>
                    <div style="width: 2px; background: #f1f5f9;"></div>
                    <div>
                        <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 800;">WEEKLY</div>
                        <div style="font-size: 2rem; font-weight: 800;"><span id="weekly-total">0</span> <small style="font-size: 0.8rem;">kcal</small></div>
                    </div>
                </div>
            </div>

            <div class="gohan-card" style="border-color: var(--success); margin-bottom: 2rem; padding: 1.5rem;">
                <p id="praise-message" style="font-weight: 600; line-height: 1.6; color: var(--text-main); font-size: 0.9rem;">
                    これまでの継続、素晴らしいです！
                </p>
            </div>

            <div style="width: 100%; max-width: 440px;">
                <h3 style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem; font-weight: 800;">RECENT LOGS</h3>
                <div id="history-list" style="display: flex; flex-direction: column; gap: 0.8rem;">
                    <!-- JSで履歴が追加される -->
                </div>
            </div>

            <div style="margin-top: 3rem;">
                <a href="startmenu.html" class="btn-gohan" style="text-decoration: none; display: inline-block; border-color: var(--success); color: var(--success);">新しい運動を開始</a>
            </div>
        </main>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
