<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fitness Diet</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: #1e293b;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.5rem;
            margin: 0;
            color: var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
        }

        button {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        #auth_btn {
            background: #e0e7ff;
            color: var(--primary);
        }

        #start_btn {
            background: var(--success);
            color: white;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
        }

        #stop_btn {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
        }

        button:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        #result-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .ai-message {
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap;
            background: #fdf2f8;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #ec4899;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="header">
            <h1>🏃‍♂️ AI Fitness Diet</h1>
            <p id="status" style="font-size: 0.8rem; color: #64748b;">Ready to start</p>
        </div>

        <div class="card">
            <div class="stats-grid">
                <div class="stat-box">
                    <span id="timer-display" class="stat-value">00:00</span>
                    <span class="stat-label">TIME</span>
                </div>
                <div class="stat-box">
                    <span id="kcal-display" class="stat-value">0.0</span>
                    <span class="stat-label">KCAL</span>
                </div>
            </div>

            <button id="auth_btn">Google Login</button>
            <button id="start_btn" disabled>START SESSION</button>
            <button id="stop_btn" disabled>STOP & ANALYZE</button>
        </div>

        <div id="result-section" class="card">
            <h3 style="margin-top:0">Analysis Result</h3>
            <canvas id="fitnessChart" style="width:100%; height:200px; margin-bottom:20px;"></canvas>
            <div id="ai-advice" class="ai-message">Gemini is thinking...</div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '794739380289-adumfdup62nm7qtt5dhih8s0p52dcae1.apps.googleusercontent.com';
        const GEMINI_API_KEY = 'AIzaSyC43LXxu0XkClQwbExzj_b4J_8hBbSaJ2w';
        const SCOPES = 'https://www.googleapis.com/auth/fitness.activity.read https://www.googleapis.com/auth/fitness.body.read';

        let tokenClient, accessToken, startTime, timerInterval;
        let myChart = null;

        window.onload = () => {
            if (typeof google !== 'undefined') {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: (resp) => {
                        if (resp.access_token) {
                            accessToken = resp.access_token;
                            document.getElementById('auth_btn').style.display = 'none';
                            document.getElementById('start_btn').disabled = false;
                            updateStatus("Connected! Press Start.");
                        }
                    },
                });
            }
        };

        document.getElementById('auth_btn').onclick = () => { if (tokenClient) tokenClient.requestAccessToken(); };

        document.getElementById('start_btn').onclick = () => {
            startTime = Date.now();
            document.getElementById('start_btn').disabled = true;
            document.getElementById('stop_btn').disabled = false;
            updateStatus("Session in progress...");
            timerInterval = setInterval(updateTimer, 1000);
        };

        function updateTimer() {
            const diff = Date.now() - startTime;
            const mins = Math.floor(diff / 60000).toString().padStart(2, '0');
            const secs = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${mins}:${secs}`;
        }

        document.getElementById('stop_btn').onclick = async () => {
            clearInterval(timerInterval);
            const endTime = Date.now();
            document.getElementById('stop_btn').disabled = true;
            updateStatus("Fetching data...");

            const kcal = await fetchCalories(startTime, endTime);
            document.getElementById('kcal-display').innerText = kcal.toFixed(1);

            document.getElementById('result-section').style.display = 'block';
            drawChart(kcal);
            await askGemini(kcal);
        };

        async function fetchCalories(start, end) {
            try {
                const response = await fetch('https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "aggregateBy": [{ "dataTypeName": "com.google.calories.expended" }],
                        "bucketByTime": { "durationMillis": end - start },
                        "startTimeMillis": start, "endTimeMillis": end
                    })
                });
                const data = await response.json();
                // ✅ 0.1問題を解決（データがない時は0にする）
                return data.bucket[0].dataset[0].point[0]?.value[0].fpVal || 0;
            } catch (e) { return 0; }
        }

        function drawChart(kcal) {
            const ctx = document.getElementById('fitnessChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['今回の消費', 'おにぎり(目安)', 'ビール(目安)'],
                    datasets: [{
                        label: 'kcal',
                        data: [kcal, 180, 150],
                        backgroundColor: ['#4f46e5', '#e2e8f0', '#e2e8f0'],
                        borderRadius: 8
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        // ✅ Gemini 連携 (最新の確定版URL)
        async function askGemini(kcal) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

            // 0kcalの場合でもアドバイスが出るように工夫
            const promptText = kcal > 0
                ? `運動で ${kcal.toFixed(1)} kcal 消費したユーザーへ、おすすめの食事提案を3つ、合計100文字程度で明るく伝えてください。`
                : `運動を始めようとしているユーザーへ、モチベーションが上がる短いアドバイスと、運動前におすすめの軽い食べ物を100文字程度で教えてください。`;

            try {
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });
                const result = await resp.json();

                if (result.error) {
                    document.getElementById('ai-advice').innerText = "AIエラー: " + result.error.message;
                } else {
                    document.getElementById('ai-advice').innerText = result.candidates[0].content.parts[0].text;
                }
                updateStatus("Done!");
            } catch (e) {
                document.getElementById('ai-advice').innerText = "AI advice unavailable.";
            }
        }

        function updateStatus(msg) {
            const statusEl = document.getElementById('status');
            if (statusEl) statusEl.innerText = msg;
        }
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>

</html>
